services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command:
      - uvicorn
      - automacao_industrial.api.app:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app/src
    environment:
      PYTHONPATH: /app/src
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - rede_automacao

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - rede_automacao

networks:
  rede_automacao:
    driver: bridge

volumes:
  frontend_node_modules:
